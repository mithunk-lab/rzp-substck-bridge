[services.backend]
rootDirectory = "backend"

[services.backend.build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && playwright install chromium --with-deps"

[services.backend.deploy]
startCommand = "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.frontend]
rootDirectory = "frontend"

[services.frontend.build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[services.frontend.deploy]
startCommand = "npx serve dist --port $PORT"
